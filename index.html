<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEME | Free Typing Speed Test</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR-ADSENSE-ID"
crossorigin="anonymous"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f0f2f5;display:flex;flex-direction:column;align-items:center;padding:15px;}

.logo{font-size:32px;font-weight:700;color:#17A2B8;}
.logo span{background:#17A2B8;color:#fff;padding:0 10px;border-radius:5px;}

.home-boxes{display:flex;gap:20px;margin:20px;flex-wrap:wrap;justify-content:center;}
.box{
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
font-size:20px;
font-weight:600;
}

.wrapper{width:100%;max-width:800px;background:#fff;padding:30px;border-radius:15px;display:none;}
.settings{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.settings button{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;}
.settings button.active{background:#17A2B8;color:#fff;}

.typing-text{max-height:250px;overflow:auto;background:#f9f9f9;padding:15px;border-radius:10px;}
.typing-text span.correct{color:green;}
.typing-text span.incorrect{color:red;}
.typing-text span.current{text-decoration:underline;}

.input-field{opacity:0;position:absolute;}

.content{margin-top:20px;display:flex;justify-content:space-between;}
.btn-refresh{background:#17A2B8;color:#fff;border:none;padding:10px;border-radius:5px;cursor:pointer;}

.footer{margin-top:30px;font-size:12px;}
</style>
</head>

<body>

<h1 class="logo">TYPE<span>ME</span></h1>

<!-- HOME BOXES -->
<div class="home-boxes">
  <div class="box" onclick="showTest()">Typing Test</div>
  <div class="box" onclick="showLearn()">Learn Typing</div>
</div>

<!-- TOP AD -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="YOUR-ADSENSE-ID"
data-ad-slot="YOUR-AD-SLOT"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<!-- TEST -->
<div class="wrapper" id="testBox">

<h2>Typing Test</h2>

<div class="settings">
<button onclick="setTime(15)">15s</button>
<button onclick="setTime(30)">30s</button>
<button class="active" onclick="setTime(60)">60s</button>
<button onclick="setTime(120)">120s</button>
</div>

<input type="text" class="input-field">

<div class="typing-text"><p></p></div>

<div class="content">
<ul>
<li>Time: <b>60s</b></li>
<li>WPM: <b>0</b></li>
<li>Errors: <b>0</b></li>
<li>Accuracy: <b>0%</b></li>
</ul>
<button class="btn-refresh">Restart</button>
</div>

</div>

<!-- MIDDLE AD -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="YOUR-ADSENSE-ID"
data-ad-slot="YOUR-AD-SLOT"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div class="footer">© 2026 TYPEME</div>

<script>
// 🔥 Firebase Config (APNA CODE LGAO)
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// UI Switch
function showTest(){
  document.getElementById("testBox").style.display="block";
}
function showLearn(){
  alert("Typing learning coming soon 😄");
}

// Typing Logic
const typingText=document.querySelector(".typing-text p"),
inpField=document.querySelector(".input-field"),
refreshBtn=document.querySelector(".btn-refresh"),
timeTag=document.querySelectorAll("b")[0],
wpmTag=document.querySelectorAll("b")[1],
mistakeTag=document.querySelectorAll("b")[2],
accTag=document.querySelectorAll("b")[3];

let timer,maxTime=60,timeLeft=60,charIndex=0,mistakes=0,isTyping=false;

// Paragraphs
const paragraphs={
15:["Quick typing improves speed!","Practice daily."],
30:["Typing fast helps productivity.","Accuracy is important."],
60:["Practice daily to improve typing speed and accuracy."],
120:["Typing is an essential skill. Practice improves performance."]
};

// Unlimited text
function loadParagraph(){
let text="";
for(let i=0;i<20;i++){
let arr=paragraphs[maxTime];
text+=arr[Math.floor(Math.random()*arr.length)]+" ";
}
typingText.innerHTML="";
text.split("").forEach((char,i)=>{
let span=document.createElement("span");
span.innerText=char;
if(i===0) span.classList.add("current");
typingText.appendChild(span);
});
charIndex=mistakes=0;
timeLeft=maxTime;
timeTag.innerText=timeLeft+"s";
wpmTag.innerText=0;
mistakeTag.innerText=0;
accTag.innerText="0%";
inpField.value="";
clearInterval(timer);
isTyping=false;
}

// Timer
function setTime(t){
maxTime=t;
loadParagraph();
}

function initTyping(){
let chars=typingText.querySelectorAll("span");
let typed=inpField.value[charIndex];

if(!isTyping){
timer=setInterval(()=>{
timeLeft--;
timeTag.innerText=timeLeft+"s";
if(timeLeft<=0){
clearInterval(timer);
endTest();
}
},1000);
isTyping=true;
}

if(charIndex<chars.length){
if(typed==chars[charIndex].innerText){
chars[charIndex].classList.add("correct");
}else{
chars[charIndex].classList.add("incorrect");
mistakes++;
}
charIndex++;
}

let wpm=Math.round(((charIndex-mistakes)/5)/((maxTime-timeLeft)/60));
wpmTag.innerText=wpm>0?wpm:0;
accTag.innerText=charIndex>0?Math.round(((charIndex-mistakes)/charIndex)*100)+"%":"0%";
mistakeTag.innerText=mistakes;
}

function endTest(){
inpField.disabled=true;

// 🔥 SAVE RESULT IN FIREBASE
db.collection("results").add({
wpm:wpmTag.innerText,
errors:mistakeTag.innerText,
accuracy:accTag.innerText,
time:maxTime,
date:new Date()
});
}

refreshBtn.addEventListener("click",loadParagraph);
inpField.addEventListener("input",initTyping);
loadParagraph();
</script>

</body>
</html>
