<script>
const text = "The 
ability 
to 
type 
quickly 
and 
accurately 
has 
become 
essential 
in

world. 
Touch 
typing 
allows 
you 
to 
type 
without 
looking 
at 
the 
keyboard, 
significantly 
improving 
your 
speed 
and 
efficiency. 
The 
home 
row 
keys 
serve 
as 
your 
base 
position, 
with 
your 
left 
hand 
on 
ASDF 
and 
right 
hand 
on 
JKL 
semicolon. 
Practice 
regularly 
to 
develop 
muscle 
memory. 
Whether 
you're 
a 
student 
writing 
essays, 
a 
professional 
composing 
emails, 
or 
a 
content 
creator 
crafting 
articles, 
improving 
your 
typing 
speed 
can 
significantly 
boost 
your

and 
efficiency. 
The 
journey

becoming

typist 
begins 
with

the

technique.This is a typing test for TYPEME website. Practice daily to improve your speed and accuracy.";

let time = 60;
let timerStarted = false;

const textDisplay = document.getElementById("textDisplay");
const input = document.getElementById("input");

function renderText() {
    textDisplay.innerHTML = text.split("").map(char => `<span>${char}</span>`).join("");
}
renderText();

input.addEventListener("input", () => {
    if (!timerStarted) {
        startTimer();
        timerStarted = true;
    }

    const inputText = input.value.split("");
    const spanChars = textDisplay.querySelectorAll("span");

    let correct = 0;

    spanChars.forEach((charSpan, index) => {
        const typedChar = inputText[index];

        if (typedChar == null) {
            charSpan.classList.remove("correct", "wrong");
        } 
        else if (typedChar === charSpan.innerText) {
            charSpan.classList.add("correct");
            charSpan.classList.remove("wrong");
            correct++;
        } 
        else {
            charSpan.classList.add("wrong");
            charSpan.classList.remove("correct");
        }
    });

    let accuracy = (correct / inputText.length) * 100;
    document.getElementById("accuracy").innerText = accuracy ? accuracy.toFixed(0) : 0;
});

function startTimer() {
    const interval = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            clearInterval(interval);
            calculateResult();
        }
    }, 1000);
}

function calculateResult() {
    let words = input.value.trim().split(" ").length;
    document.getElementById("wpm").innerText = words;
}
</script>
