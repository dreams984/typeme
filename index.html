<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPEME | Typing Speed Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#f0f2f5;display:flex;flex-direction:column;align-items:center;padding:15px;}
        
        [span_0](start_span)/* TYPEME Logo[span_0](end_span) */
        .logo{font-size:clamp(30px, 6vw, 45px);font-weight:700;color:#2c3e50;text-align:center;margin-bottom: 20px;}
        .logo span{background:#17A2B8;color:#fff;padding:0 12px;border-radius:8px;margin-left: 5px;}
        
        .wrapper{width:100%;max-width:800px;background:#fff;padding:35px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        
        [span_1](start_span)/* Timer Buttons[span_1](end_span) */
        .settings{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
        .settings button{padding:8px 16px;border:1px solid #ddd; border-radius:20px;cursor:pointer; background: white;}
        .settings button.active{background:#17A2B8;color:#fff; border-color: #17A2B8;}
        
        [span_2](start_span)/* Typing Area[span_2](end_span) */
        .typing-text{max-height:250px;overflow:auto;background:#f9f9f9;padding:15px;border-radius:10px;font-size:22px;line-height:1.6; border: 1px solid #eee; margin-bottom: 20px;}
        .typing-text span.correct{color:#28a745;}
        .typing-text span.incorrect{color:#dc3545; background: #ffd7d7; border-radius: 4px;}
        .typing-text span.current{text-decoration:underline; color: #17A2B8;}
        
        .input-field{position:absolute;opacity:0;pointer-events:none;}
        
        [span_3](start_span)/* Result Dashboard[span_3](end_span) */
        .result-details{display:flex; justify-content: space-around; background: #2c3e50; padding: 20px; border-radius: 12px; color: #fff; list-style: none; margin-bottom: 20px;}
        .result-details li b{color: #17A2B8; font-size: 24px; display: block;}
        
        .btn-refresh{width: 100%; background:#17A2B8;color:#fff;border:none;padding:15px;border-radius:10px;cursor:pointer; font-size: 18px; font-weight: 600;}
        
        [span_4](start_span)/* AdSense Slots[span_4](end_span) */
        .ad-slot{width: 100%; max-width: 800px; margin: 15px 0; background: #e9ecef; border: 1px dashed #bbb; text-align: center; padding: 10px; color: #777; font-size: 12px;}
    </style>
</head>
<body>

<h1 class="logo">TYPE<span>ME</span></h1>

<div class="ad-slot">
    ADSENSE TOP AD
</div>

<div class="wrapper">
    <div class="settings">
        <button onclick="setTime(15)">15s</button>
        <button onclick="setTime(30)">30s</button>
        <button class="active" onclick="setTime(60)">60s</button>
        <button onclick="setTime(120)">120s</button>
    </div>

    <input type="text" class="input-field">
    <div class="typing-text"><p></p></div>

    <ul class="result-details">
        <li>Time: <b>60s</b></li>
        <li>WPM: <b>0</b></li>
        <li>Errors: <b>0</b></li>
        <li>Accuracy: <b>0%</b></li>
    </ul>
    
    <button class="btn-refresh">Restart Test</button>
</div>

<div class="ad-slot">
    ADSENSE BOTTOM AD
</div>

<script>
const typingText = document.querySelector(".typing-text p"),
      inpField = document.querySelector(".input-field"),
      refreshBtn = document.querySelector(".btn-refresh"),
      timeTag = document.querySelectorAll(".result-details b")[0],
      wpmTag = document.querySelectorAll(".result-details b")[1],
      mistakeTag = document.querySelectorAll(".result-details b")[2],
      accuracyTag = document.querySelectorAll(".result-details b")[3];

let timer, maxTime = 60, timeLeft = maxTime, charIndex = 0, mistakes = 0, isTyping = false;

[span_5](start_span)// Paragraph samples[span_5](end_span)
const paragraphs = [
    "Typing speed is a critical skill for productivity in the modern world. Practice makes perfect.",
    "Consistency is key when learning a new skill. Try to type for at least ten minutes every day.",
    "The quick brown fox jumps over the lazy dog. This sentence contains every letter of the alphabet.",
    "Focus on accuracy before speed. Once you stop making mistakes, your speed will naturally increase."
];

function loadParagraph() {
    const ranIndex = Math.floor(Math.random() * paragraphs.length);
    typingText.innerHTML = "";
    [span_6](start_span)// split text into spans[span_6](end_span)
    paragraphs[ranIndex].split("").forEach(char => {
        let span = `<span>${char}</span>`;
        typingText.innerHTML += span;
    });
    typingText.querySelectorAll("span")[0].classList.add("current");
    
    [span_7](start_span)// Resetting variables[span_7](end_span)
    charIndex = mistakes = 0;
    timeLeft = maxTime;
    isTyping = false;
    clearInterval(timer);
    
    // UI Reset
    timeTag.innerText = timeLeft + "s";
    wpmTag.innerText = 0;
    mistakeTag.innerText = 0;
    accuracyTag.innerText = "0%";
    inpField.value = "";
}

function initTyping() {
    let characters = typingText.querySelectorAll("span");
    let typedChar = inpField.value.split("")[charIndex];

    if(charIndex < characters.length && timeLeft > 0) {
        if(!isTyping) {
            timer = setInterval(updateTimer, 1000);
            isTyping = true;
        }

        [span_8](start_span)if(typedChar == null) { // Handle backspace[span_8](end_span)
            if(charIndex > 0) {
                charIndex--;
                if(characters[charIndex].classList.contains("incorrect")) mistakes--;
                characters[charIndex].classList.remove("correct", "incorrect");
            }
        } else {
            if(characters[charIndex].innerText === typedChar) {
                characters[charIndex].classList.add("correct");
            } else {
                mistakes++;
                characters[charIndex].classList.add("incorrect");
            }
            charIndex++;
        }
        
        characters.forEach(span => span.classList.remove("current"));
        if(charIndex < characters.length) characters[charIndex].classList.add("current");

        [span_9](start_span)//[span_9](end_span) Calculations
        let wpm = Math.round(((charIndex - mistakes) / 5) / ((maxTime - timeLeft) / 60));
        wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
        let accuracy = charIndex > 0 ? Math.round(((charIndex - mistakes) / charIndex) * 100) : 0;

        wpmTag.innerText = wpm;
        mistakeTag.innerText = mistakes;
        accuracyTag.innerText = accuracy + "%";
    } else {
        clearInterval(timer);
    }
}

function updateTimer() {
    if(timeLeft > 0) {
        timeLeft--;
        timeTag.innerText = timeLeft + "s";
    } else {
        clearInterval(timer);
    }
}

function setTime(t) {
    maxTime = t;
    [span_10](start_span)// Update button UI[span_10](end_span)
    document.querySelectorAll(".settings button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
    loadParagraph();
}

[span_11](start_span)// Event Listeners[span_11](end_span)
refreshBtn.addEventListener("click", loadParagraph);
inpField.addEventListener("input", initTyping);
document.addEventListener("keydown", () => inpField.focus());
typingText.addEventListener("click", () => inpField.focus());

// Initialize first load
loadParagraph();
</script>
</body>
</html>
