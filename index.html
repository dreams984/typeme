<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEME</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDx94Clq07I9h-ewtOOY56e9mVpjwMfDFo",
  authDomain: "http://typeme-web.firebaseapp.com",
  projectId: "typeme-web"
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOAD SETTINGS
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){

// VERIFY CODE
document.write(doc.data().verifyCode || "");

// ADS
document.getElementById("topAd").innerHTML = doc.data().topAd || "";
document.getElementById("middleAd").innerHTML = doc.data().middleAd || "";
document.getElementById("bottomAd").innerHTML = doc.data().bottomAd || "";

}
});
</script>

<style>
body{font-family:Poppins;background:#f0f2f5;text-align:center;}
.logo{font-size:30px;color:#17A2B8;font-weight:bold;}
.logo span{background:#17A2B8;color:#fff;padding:5px;border-radius:5px;}
.wrapper{background:#fff;padding:20px;margin:20px;border-radius:10px;}
.typing-text{background:#eee;padding:10px;border-radius:5px;}
.correct{color:green;}
.incorrect{color:red;}
.ad-box{margin:15px 0;}
</style>
</head>

<body>

<h1 class="logo">TYPE<span>ME</span></h1>

<!-- 🔝 TOP AD -->
<div id="topAd" class="ad-box"></div>

<div class="wrapper">

<input type="text" id="input" autofocus>
<div class="typing-text" id="text"></div>

<p>Time: <span id="time">60</span></p>
<p>WPM: <span id="wpm">0</span></p>
<p>Errors: <span id="errors">0</span></p>

<button onclick="startTest()">Restart</button>

</div>

<!-- 📍 MIDDLE AD -->
<div id="middleAd" class="ad-box"></div>

<!-- 🔻 BOTTOM AD -->
<div id="bottomAd" class="ad-box"></div>

<script>
// WORD POOLS
const paragraphs = {
60:["Practice daily to improve typing speed","Typing fast requires focus and accuracy","Consistency is key to mastering typing"],
30:["Typing improves productivity","Practice makes perfect"],
15:["Quick typing helps","Stay focused"]
};

let textEl=document.getElementById("text");
let input=document.getElementById("input");

let time=60,timer,index=0,errors=0;

// GENERATE TEXT
function generateMoreText(){
let pool=paragraphs[60];
let text="";
for(let i=0;i<30;i++){
text+=pool[Math.floor(Math.random()*pool.length)]+" ";
}

text.split("").forEach((c,i)=>{
let span=document.createElement("span");
span.innerText=c;
if(i===0 && index===0) span.classList.add("current");
textEl.appendChild(span);
});
}

// START TEST
function startTest(){
textEl.innerHTML="";
generateMoreText();

time=60; index=0; errors=0;
input.value="";
clearInterval(timer);

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(timer);
saveResult();
}
},1000);
}

// TYPING
input.addEventListener("input",()=>{
let spans=textEl.querySelectorAll("span");
let val=input.value;

// AUTO EXTEND TEXT
if(index >= spans.length-1){
generateMoreText();
}

if(val[index]===spans[index].innerText){
spans[index].classList.add("correct");
}else{
spans[index].classList.add("incorrect");
errors++;
}
index++;

let wpm=Math.round((index/5)/((60-time)/60));
document.getElementById("wpm").innerText=wpm||0;
document.getElementById("errors").innerText=errors;
});

// SAVE RESULT
function saveResult(){
db.collection("results").add({
wpm:document.getElementById("wpm").innerText,
errors:errors,
date:new Date()
});
}

startTest();
</script>

</body>
</html>
