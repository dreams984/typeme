<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEME | Typing Test</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 APNA FIREBASE CODE YAHA LGAO
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOAD SETTINGS (ADS + VERIFY)
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){
document.write(doc.data().verifyCode || "");
}
});
</script>

<style>
body{font-family:Poppins;background:#f0f2f5;text-align:center;}
.logo{font-size:30px;color:#17A2B8;font-weight:bold;}
.logo span{background:#17A2B8;color:#fff;padding:5px;border-radius:5px;}
.boxes{display:flex;justify-content:center;gap:20px;margin:20px;}
.box{background:#fff;padding:20px;border-radius:10px;cursor:pointer;}
.wrapper{display:none;background:#fff;padding:20px;margin:20px;border-radius:10px;}
.typing-text{background:#eee;padding:10px;}
.correct{color:green;} .incorrect{color:red;}
</style>
</head>

<body>

<h1 class="logo">TYPE<span>ME</span></h1>

<!-- HOME -->
<div class="boxes">
<div class="box" onclick="startTest()">Typing Test</div>
<div class="box">Learn Typing (Soon)</div>
</div>

<!-- ADS -->
<div id="adsTop"></div>

<!-- TEST -->
<div class="wrapper" id="testBox">
<h2>Typing Test</h2>
<input type="text" id="input" autofocus>
<div class="typing-text" id="text"></div>

<p>Time: <span id="time">60</span></p>
<p>WPM: <span id="wpm">0</span></p>
<p>Errors: <span id="errors">0</span></p>

<button onclick="startTest()">Restart</button>
</div>

<script>
// 🔥 LOAD ADS
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){
document.getElementById("adsTop").innerHTML = doc.data().adCode;
}
});

// Typing Logic
let textEl=document.getElementById("text");
let input=document.getElementById("input");
let timeEl=document.getElementById("time");

let time=60, timer, index=0, errors=0;

const words=["typing improves speed","practice daily","focus on accuracy"];

function generateText(){
let t="";
for(let i=0;i<50;i++){
t+=words[Math.floor(Math.random()*words.length)]+" ";
}
textEl.innerHTML=t.split("").map(c=>`<span>${c}</span>`).join("");
}

function startTest(){
document.getElementById("testBox").style.display="block";
generateText();
time=60; index=0; errors=0;
input.value="";
clearInterval(timer);

timer=setInterval(()=>{
time--;
timeEl.innerText=time;
if(time<=0){
clearInterval(timer);
saveResult();
}
},1000);
}

input.addEventListener("input",()=>{
let spans=textEl.querySelectorAll("span");
let val=input.value;

if(val[index]===spans[index].innerText){
spans[index].classList.add("correct");
}else{
spans[index].classList.add("incorrect");
errors++;
}
index++;

let wpm=Math.round((index/5)/((60-time)/60));
document.getElementById("wpm").innerText=wpm||0;
document.getElementById("errors").innerText=errors;
});

function saveResult(){
db.collection("results").add({
wpm:document.getElementById("wpm").innerText,
errors:errors,
date:new Date()
});
}
</script>

</body>
</html>
