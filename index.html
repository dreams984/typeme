<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEME PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR.firebaseapp.com",
  projectId: "YOUR"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOAD ADS + VERIFY
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){
document.write(doc.data().verifyCode || "");
document.getElementById("ads").innerHTML = doc.data().adCode || "";
}
});
</script>

<style>
body{font-family:Poppins;background:#f0f2f5;text-align:center;}
.logo{font-size:32px;color:#17A2B8;font-weight:bold;}
.menu{display:flex;gap:10px;justify-content:center;margin:20px;}
.menu button{padding:10px;border:none;background:#17A2B8;color:#fff;border-radius:5px;}

.section{display:none;background:#fff;margin:20px;padding:20px;border-radius:10px;}

.typing-text span.correct{color:green;}
.typing-text span.incorrect{color:red;}

.key{padding:10px;border:1px solid #ccc;margin:3px;display:inline-block;}
.active{background:#17A2B8;color:#fff;}
</style>
</head>

<body>

<h1 class="logo">TYPEME PRO</h1>

<div class="menu">
<button onclick="show('test')">Test</button>
<button onclick="show('lessons')">Lessons</button>
<button onclick="show('practice')">Practice</button>
</div>

<div id="ads"></div>

<!-- TEST -->
<div class="section" id="test">
<h2>Typing Test</h2>
<input id="testInput">
<div id="testText" class="typing-text"></div>
<p>WPM: <span id="wpm">0</span></p>
</div>

<!-- LESSONS -->
<div class="section" id="lessons">
<h2>Typing Lessons (A-Z)</h2>
<div id="lessonText"></div>
<input id="lessonInput">
<p>Lesson: <span id="lessonName"></span></p>
</div>

<!-- PRACTICE -->
<div class="section" id="practice">
<h2>Practice (ASDF Row)</h2>
<div id="keys"></div>
<input id="practiceInput">
</div>

<script>
// NAV
function show(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// ---------------- TEST ----------------
let testWords=["practice typing","improve speed","focus accuracy"];
let testIndex=0;

function loadTest(){
let text="";
for(let i=0;i<40;i++){
text+=testWords[Math.floor(Math.random()*testWords.length)]+" ";
}
testText.innerHTML=text.split("").map(c=>`<span>${c}</span>`).join("");
}
loadTest();

testInput.addEventListener("input",()=>{
let spans=testText.querySelectorAll("span");
let val=testInput.value;

if(val[testIndex]===spans[testIndex].innerText){
spans[testIndex].classList.add("correct");
}else{
spans[testIndex].classList.add("incorrect");
}
testIndex++;
});

// ---------------- LESSONS ----------------
let lessons=[
{title:"Home Row (ASDF)", text:"asdf asdf asdf"},
{title:"Top Row (QWER)", text:"qwer qwer qwer"},
{title:"Bottom Row (ZXCV)", text:"zxcv zxcv zxcv"},
{title:"Full A-Z", text:"abcdefghijklmnopqrstuvwxyz"}
];

let currentLesson=0;

function loadLesson(){
lessonText.innerHTML=lessons[currentLesson].text;
lessonName.innerText=lessons[currentLesson].title;
lessonInput.value="";
}
loadLesson();

lessonInput.addEventListener("input",()=>{
if(lessonInput.value === lessons[currentLesson].text){
currentLesson++;
if(currentLesson<lessons.length){
loadLesson();
}else{
alert("Course Complete 🎉");
}
}
});

// ---------------- PRACTICE ----------------
let practiceKeys="asdf jkl;".split("");

function loadPractice(){
keys.innerHTML="";
practiceKeys.forEach(k=>{
let span=document.createElement("span");
span.innerText=k;
span.classList.add("key");
keys.appendChild(span);
});
}
loadPractice();

practiceInput.addEventListener("input",()=>{
let val=practiceInput.value.slice(-1);
document.querySelectorAll(".key").forEach(k=>{
k.classList.remove("active");
if(k.innerText===val) k.classList.add("active");
});
});

</script>

</body>
</html>
