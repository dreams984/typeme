<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPEME | Free Typing Test</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f0f2f5;display:flex;flex-direction:column;align-items:center;padding:15px;}
.logo{font-size:32px;font-weight:700;color:#17A2B8;}
.logo span{background:#17A2B8;color:#fff;padding:0 10px;border-radius:5px;}
.wrapper{width:100%;max-width:800px;background:#fff;padding:30px;border-radius:15px;}
.typing-text{max-height:250px;overflow:auto;background:#f9f9f9;padding:15px;border-radius:10px;}
.correct{color:green;}
.incorrect{color:red;}
.current{text-decoration:underline;}
.ad-box{margin:20px 0;}
</style>
</head>

<body>

<h1 class="logo">TYPE<span>ME</span></h1>

<!-- 🔝 TOP AD -->
<div id="topAd" class="ad-box"></div>

<div class="wrapper">
<input type="text" class="input-field">

<div class="typing-text"><p></p></div>

<p>Time: <b id="time">60</b></p>
<p>WPM: <b id="wpm">0</b></p>
<p>Errors: <b id="errors">0</b></p>

<button onclick="loadParagraph()">Restart</button>
</div>

<!-- 📍 MIDDLE AD -->
<div id="middleAd" class="ad-box"></div>

<!-- 🔻 BOTTOM AD -->
<div id="bottomAd" class="ad-box"></div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDx94Clq07I9h-ewtOOY56e9mVpjwMfDFo",
  authDomain: "http://typeme-web.firebaseapp.com",
  projectId: "typeme-web"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOAD ADS FROM ADMIN
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){
document.getElementById("topAd").innerHTML = doc.data().topAd || "";
document.getElementById("middleAd").innerHTML = doc.data().middleAd || "";
document.getElementById("bottomAd").innerHTML = doc.data().bottomAd || "";
}
});

// ORIGINAL VARIABLES
const typingText = document.querySelector(".typing-text p"),
inpField = document.querySelector(".input-field");

let timer, maxTime=60, timeLeft=maxTime, charIndex=0, mistakes=0, isTyping=false;

// TEXT POOL
const baseTexts = [
"Practice daily to improve typing speed.",
"Typing fast helps you save time.",
"Accuracy is more important than speed.",
"Use all fingers while typing.",
"Consistency is key to improvement."
];

// 🔥 LOAD PARAGRAPH (INFINITE)
function loadParagraph(){
typingText.innerHTML="";
charIndex=mistakes=0;
timeLeft=maxTime;

let bigText="";
for(let i=0;i<50;i++){
bigText+=baseTexts[Math.floor(Math.random()*baseTexts.length)]+" ";
}

bigText.split("").forEach((char,index)=>{
const span=document.createElement("span");
span.innerText=char;
if(index===0) span.classList.add("current");
typingText.appendChild(span);
});

inpField.value="";
clearInterval(timer);
timer=setInterval(updateTimer,1000);
}

// TYPING
inpField.addEventListener("input",()=>{
const characters=typingText.querySelectorAll("span");
let typedChar=inpField.value[charIndex];

if(charIndex < characters.length){
if(typedChar===characters[charIndex].innerText){
characters[charIndex].classList.add("correct");
}else{
characters[charIndex].classList.add("incorrect");
mistakes++;
}
charIndex++;
}

// 🔥 AUTO EXTEND TEXT
if(charIndex >= characters.length-10){
let extra="";
for(let i=0;i<20;i++){
extra+=baseTexts[Math.floor(Math.random()*baseTexts.length)]+" ";
}
extra.split("").forEach(char=>{
const span=document.createElement("span");
span.innerText=char;
typingText.appendChild(span);
});
}

// STATS
let wpm=Math.round(((charIndex-mistakes)/5)/((maxTime-timeLeft)/60));
document.getElementById("wpm").innerText=wpm||0;
document.getElementById("errors").innerText=mistakes;
});

// TIMER
function updateTimer(){
if(timeLeft>0){
timeLeft--;
document.getElementById("time").innerText=timeLeft;
}else clearInterval(timer);
}

loadParagraph();
</script>

</body>
</html>
